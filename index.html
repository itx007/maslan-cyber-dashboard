<div class="main-grid">
    <div class="card chart-container">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn" style="width: auto; padding: 5px 15px;" onclick="changeChart('BINANCE:BTCUSDT')">BTC</button>
            <button class="btn" style="width: auto; padding: 5px 15px;" onclick="changeChart('BINANCE:ETHUSDT')">ETH</button>
            <button class="btn" style="width: auto; padding: 5px 15px;" onclick="changeChart('BINANCE:BNBUSDT')">BNB</button>
        </div>
        
        <h3 id="chart-title" style="margin-top:0; font-size: 0.9rem; color: var(--primary);">LIVE MARKET DATA (BTC)</h3>
        <div id="tradingview_chart" style="height: 90%;"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color: var(--primary);">MARKET TOOLS</h3>
        <button class="btn">Technical Scanner v4.2</button>
        <button class="btn">Whale Wallet Tracker</button>
        <button class="btn">AI Signal Generator</button>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentWidget;

    function changeChart(symbol) {
        document.getElementById('chart-title').innerText = `LIVE MARKET DATA (${symbol.split(':')[1]})`;
        
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "container_id": "tradingview_chart"
        });
    }

    // Initial load with BTC
    function unlock() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'cyber2024') {
            document.getElementById('login-screen').style.display = 'none';
            changeChart('BINANCE:BTCUSDT');
            updateData();
            setInterval(updateData, 10000);
        } else {
            document.getElementById('err').innerText = "INVALID CREDENTIALS";
        }
    }

    async function updateData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd');
            const data = await res.json();
            document.getElementById('btc-p').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
            document.getElementById('eth-p').innerText = `$${data.ethereum.usd.toLocaleString()}`;
            document.getElementById('bnb-p').innerText = `$${data.binancecoin.usd.toLocaleString()}`;
        } catch(e) {}
    }
</script>
