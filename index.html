<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Dark | CMC Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --text: #eaecef; --border: #474d57; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 320px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 5px; outline: none; }

        /* CMC Layout */
        .global-bar { background: #181a20; padding: 10px 5%; display: flex; gap: 20px; font-size: 0.75rem; color: #848e9c; border-bottom: 1px solid var(--border); }
        .yellow { color: var(--primary); font-weight: bold; }
        .container { display: grid; grid-template-columns: 2.5fr 1fr; gap: 20px; padding: 20px 5%; }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); min-height: 400px; }
        
        /* Interactive Tabs */
        .market-tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab { cursor: pointer; padding-bottom: 10px; font-weight: bold; color: #848e9c; transition: 0.3s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; color: #848e9c; padding-bottom: 10px; border-bottom: 1px solid #2b3139; }
        td { padding: 15px 0; border-bottom: 1px solid #2b3139; cursor: pointer; font-size: 0.85rem; }
        .up { color: #0ecb81; } .down { color: #f6465d; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="font-family: Orbitron; color: var(--primary);">DR. DARK SECURE</h2>
        <input type="text" id="user" placeholder="Access ID">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="unlock()">INITIALIZE</button>
        <p id="err" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>
</div>

<div class="global-bar">
    <span>Market Cap: <span class="yellow" id="cap">$2.34T</span></span>
    <span>BTC Dom: <span class="yellow">52.4%</span></span>
    <span>Fear & Greed: <span class="yellow" id="fgi-val">65</span></span>
</div>

<div class="container">
    <div class="card">
        <h3 id="chart-head" style="margin-top:0;">BTCUSDT PRO ANALYSIS</h3>
        <div id="tv_chart" style="height: 500px;"></div>
    </div>

    <div class="card">
        <div class="market-tabs">
            <div class="tab active" onclick="switchTab('top', this)">Top 100</div>
            <div class="tab" onclick="switchTab('trending', this)">Trending</div>
            <div class="tab" onclick="switchTab('watchlist', this)">Watchlist</div>
        </div>
        <div style="max-height: 500px; overflow-y: auto;">
            <table>
                <thead><tr><th>#</th><th>Coin</th><th>Price</th><th>24h%</th></tr></thead>
                <tbody id="market-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let masterData = [];
    let favs = ['btc', 'eth', 'sol', 'bnb', 'trx'];

    function unlock() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'cyber2024') {
            document.getElementById('login-screen').style.display = 'none';
            init();
        } else {
            document.getElementById('err').innerText = "Access Denied";
        }
    }

    async function init() {
        await fetchTop();
        loadChart('BTCUSDT');
        updateGlobal();
    }

    async function fetchTop() {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100');
        masterData = await res.json();
        render(masterData);
    }

    async function fetchTrending() {
        const res = await fetch('https://api.coingecko.com/api/v3/search/trending');
        const data = await res.json();
        const trend = data.coins.map(c => ({
            symbol: c.item.symbol.toUpperCase(),
            current_price: 0,
            price_change_percentage_24h: 0
        }));
        render(trend, true);
    }

    function render(data, isTrend = false) {
        const list = document.getElementById('market-list');
        list.innerHTML = data.map((c, i) => `
            <tr onclick="loadChart('${c.symbol.toUpperCase()}USDT')">
                <td style="color:#848e9c">${i+1}</td>
                <td><strong>${c.symbol.toUpperCase()}</strong></td>
                <td>${isTrend ? 'Hot' : '$'+c.current_price.toLocaleString()}</td>
                <td class="${c.price_change_percentage_24h >= 0 ? 'up' : 'down'}">
                    ${c.price_change_percentage_24h.toFixed(2)}%
                </td>
            </tr>
        `).join('');
    }

    function switchTab(type, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(type === 'trending') fetchTrending();
        else if(type === 'watchlist') render(masterData.filter(c => favs.includes(c.symbol.toLowerCase())));
        else fetchTop();
    }

    function loadChart(s) {
        document.getElementById('chart-head').innerText = s + " ANALYSIS";
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "theme": "dark", "style": "1",
            "container_id": "tv_chart", "studies": ["RSI@tv-basicstudies"]
        });
    }

    async function updateGlobal() {
        const res = await fetch('https://api.alternative.me/fng/');
        const d = await res.json();
        document.getElementById('fgi-val').innerText = d.data[0].value + " (" + d.data[0].value_classification + ")";
    }
</script>
</body>
</html>
