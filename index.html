<script>
    let coinData = []; // Global data store
    let favorites = ['btc', 'eth', 'sol', 'bnb', 'trx']; // Sample Watchlist

    // 1. Tab Switching & Data Loading Logic
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', async () => {
            // UI Update: Sabse "active" class hatao aur click wale par lagao
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            const mode = tab.innerText.toLowerCase();
            const listContainer = document.getElementById('market-list');
            listContainer.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';

            if(mode.includes('trending')) {
                await fetchTrending();
            } else if(mode.includes('watchlist')) {
                showWatchlist();
            } else {
                await fetchMarketData(); // Top 100
            }
        });
    });

    // 2. Trending Coins Function (API se real-time data lega)
    async function fetchTrending() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/search/trending');
            const data = await res.json();
            const trending = data.coins.map(c => ({
                symbol: c.item.symbol.toUpperCase(),
                current_price: "Trending", 
                price_change_percentage_24h: 0,
                name: c.item.name
            }));
            renderTable(trending);
        } catch (e) { console.error("Trending error", e); }
    }

    // 3. Watchlist Function
    function showWatchlist() {
        const filtered = coinData.filter(c => favorites.includes(c.symbol.toLowerCase()));
        if(filtered.length === 0) {
            document.getElementById('market-list').innerHTML = '<tr><td colspan="4" style="text-align:center;">Watchlist is empty</td></tr>';
        } else {
            renderTable(filtered);
        }
    }

    // 4. Main Market Data (Top 100)
    async function fetchMarketData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100');
            coinData = await res.json();
            renderTable(coinData);
        } catch (e) { console.error("Market data error", e); }
    }

    // Table Render karne ka professional tarika
    function renderTable(data) {
        const list = document.getElementById('market-list');
        list.innerHTML = data.map((coin, i) => `
            <tr onclick="loadChart('${coin.symbol}USDT')">
                <td style="color:#848e9c">${i+1}</td>
                <td><strong>${coin.symbol}</strong></td>
                <td>${typeof coin.current_price === 'number' ? '$' + coin.current_price.toLocaleString() : coin.current_price}</td>
                <td class="${coin.price_change_percentage_24h >= 0 ? 'price-up' : 'price-down'}">
                    ${coin.price_change_percentage_24h.toFixed(2)}%
                </td>
            </tr>
        `).join('');
    }

    // Initial Load
    window.onload = () => {
        fetchMarketData();
        // Global stats load karne ka function yahan call karein
    };
</script>
