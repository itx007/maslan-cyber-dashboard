<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Dark | Global Market Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --bg-black: #050508;
            --card-bg: #0b0b0f;
            --border: rgba(255, 255, 255, 0.05);
            --up: #00ff88;
            --down: #ff0033;
        }

        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Inter', sans-serif; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #16161e; border: 1px solid var(--border); color: white; border-radius: 5px; outline: none; }

        /* Navbar */
        .navbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-weight: bold; color: var(--primary); letter-spacing: 2px; }

        /* Layout */
        .container { padding: 20px 5%; display: grid; grid-template-columns: 2.5fr 1fr; gap: 20px; }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        
        /* Coin Table */
        .search-box { width: 100%; padding: 12px; background: #16161e; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 15px; }
        .market-table-container { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card-bg); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        td:hover { background: rgba(255,255,255,0.03); }

        .btn { background: var(--primary); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="font-family: Orbitron;">DR. DARK ACCESS</h2>
        <input type="text" id="user" placeholder="ID">
        <input type="password" id="pass" placeholder="KEY">
        <button class="btn" onclick="unlock()">ENTER SYSTEM</button>
    </div>
</div>

<div class="navbar">
    <div class="logo">DR. DARK ANALYTICS</div>
    <div id="global-stats" style="font-size: 0.75rem; color: #888;">Global Cap: $... | BTC Dom: ...%</div>
</div>

<div class="container">
    <div class="card">
        <h3 id="active-coin" style="margin-top:0; color: var(--primary);">BITCOIN (BTCUSDT)</h3>
        <div id="tradingview_chart" style="height: 550px;"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 1rem;">MARKET CAP (LIVE)</h3>
        <input type="text" id="search" class="search-box" placeholder="Search coins (e.g. SOL, XRP...)" onkeyup="filterCoins()">
        
        <div class="market-table-container">
            <table id="coinTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>COIN</th>
                        <th>PRICE</th>
                        <th>24H</th>
                    </tr>
                </thead>
                <tbody id="coin-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let allCoins = [];

    function unlock() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'cyber2024') {
            document.getElementById('login-screen').style.display = 'none';
            loadMarketData();
            changeChart('BTCUSDT');
            setInterval(loadMarketData, 30000); // 30 sec update
        }
    }

    async function loadMarketData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
            allCoins = await res.json();
            renderTable(allCoins);
        } catch(e) { console.error("API Error"); }
    }

    function renderTable(data) {
        const list = document.getElementById('coin-list');
        list.innerHTML = '';
        data.forEach((coin, index) => {
            const change = coin.price_change_percentage_24h.toFixed(2);
            const color = change >= 0 ? 'var(--up)' : 'var(--down)';
            
            list.innerHTML += `
                <tr onclick="changeChart('${coin.symbol.toUpperCase()}USDT')">
                    <td style="color:#555">${index + 1}</td>
                    <td><strong>${coin.symbol.toUpperCase()}</strong></td>
                    <td>$${coin.current_price.toLocaleString()}</td>
                    <td style="color:${color}">${change}%</td>
                </tr>
            `;
        });
    }

    function filterCoins() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = allCoins.filter(c => c.name.toLowerCase().includes(query) || c.symbol.toLowerCase().includes(query));
        renderTable(filtered);
    }

    function changeChart(symbol) {
        document.getElementById('active-coin').innerText = `${symbol} ANALYSIS`;
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + symbol,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_chart",
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "details": true,
            "studies": ["MAExp@tv-basicstudies", "RSI@tv-basicstudies"]
        });
    }
</script>

</body>
</html>
