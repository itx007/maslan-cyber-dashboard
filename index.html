<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DR. DARK AI | Institutional Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --primary: #f0b90b; --text: #eff2f5; --sub: #848e9c; --border: #2b3139; --up: #0ecb81; --down: #f6465d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .logo { font-weight: 800; font-size: 16px; color: var(--primary); letter-spacing: 1px; }
        .status { font-size: 10px; color: var(--up); font-weight: 600; }

        .content { margin-top: 55px; padding-bottom: 80px; }

        /* TradingView Chart Container */
        .chart-section { width: 100%; height: 350px; background: #000; border-bottom: 2px solid var(--border); position: relative; }
        
        /* AI Analysis Panel */
        .ai-panel { background: #1e2329; margin: 10px; border-radius: 12px; border: 1px solid var(--border); padding: 15px; }
        .ai-title { font-size: 12px; color: var(--primary); font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .signal-grid { display: flex; justify-content: space-between; align-items: center; }
        .signal-badge { padding: 8px 20px; border-radius: 6px; font-weight: 800; font-size: 16px; text-transform: uppercase; }
        .buy { background: rgba(14, 203, 129, 0.2); color: var(--up); border: 1px solid var(--up); }
        .sell { background: rgba(246, 70, 93, 0.2); color: var(--down); border: 1px solid var(--down); }

        /* Market Table Section */
        .market-header { padding: 15px 15px 5px 15px; }
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; padding: 0 15px; }
        .tab { padding: 10px 0; color: var(--sub); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--sub); font-size: 11px; padding: 10px 15px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        td:active { background: #2b3139; }

        .coin-info { display: flex; align-items: center; gap: 10px; }
        .coin-icon { width: 24px; height: 24px; border-radius: 50%; }
        .symbol { font-weight: 700; font-size: 14px; }
        .cap { font-size: 10px; color: var(--sub); }
        .price { font-weight: 700; text-align: right; font-size: 14px; }
        .change { font-weight: 700; text-align: right; font-size: 13px; }
        .up { color: var(--up); } .down { color: var(--down); }

        /* Footer Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-link { text-align: center; font-size: 10px; color: var(--sub); font-weight: 600; text-transform: uppercase; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">DOCTOR DARK AI</div>
    <div class="status">● LIVE DATA SECURE</div>
</div>

<div class="content">
    <div class="chart-section" id="tv-chart">
        </div>

    <div class="ai-panel">
        <div class="ai-title">⚡ DOCTOR DARK INSTITUTIONAL ANALYSIS</div>
        <div class="signal-grid">
            <div>
                <div id="active-coin" style="font-size: 20px; font-weight: 800;">BITCOIN</div>
                <div id="active-price" style="color: var(--sub); font-size: 14px;">Loading...</div>
            </div>
            <div id="ai-signal" class="signal-badge buy">Strong Buy</div>
        </div>
        <div style="margin-top: 10px; font-size: 11px; color: var(--sub);">
            RSI: <span id="rsi-val" style="color:#fff">54.2</span> | 
            Trend: <span id="trend-val" style="color:var(--up)">Bullish</span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="updateTable('all', this)">Top 100</div>
        <div class="tab" onclick="updateTable('trending', this)">Trending</div>
        <div class="tab" onclick="updateTable('new', this)">New Listing</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Asset</th>
                <th style="text-align:right;">Price</th>
                <th style="text-align:right;">24h %</th>
            </tr>
        </thead>
        <tbody id="market-list">
            </tbody>
    </table>
</div>

<div class="nav">
    <div class="nav-link active">Markets</div>
    <div class="nav-link">Analytics</div>
    <div class="nav-link">Dr. AI</div>
    <div class="nav-link">Portfolio</div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentCoin = "BTCUSDT";
    let allCoins = [];

    // Initialize Chart
    function loadChart(symbol) {
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + symbol,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "save_image": false,
            "container_id": "tv-chart"
        });
    }

    // Fetch Market Data
    async function fetchData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&sparkline=false');
            allCoins = await res.json();
            renderTable(allCoins);
        } catch (e) { console.log("API Error"); }
    }

    function renderTable(data) {
        const list = document.getElementById('market-list');
        list.innerHTML = data.map(coin => `
            <tr onclick="selectCoin('${coin.symbol.toUpperCase()}USDT', '${coin.name}', '${coin.current_price}')">
                <td>
                    <div class="coin-info">
                        <img src="${coin.image}" class="coin-icon">
                        <div>
                            <div class="symbol">${coin.symbol.toUpperCase()}</div>
                            <div class="cap">$${(coin.market_cap / 1e9).toFixed(1)}B</div>
                        </div>
                    </div>
                </td>
                <td class="price">$${coin.current_price.toLocaleString()}</td>
                <td class="change ${coin.price_change_percentage_24h >= 0 ? 'up' : 'down'}">
                    ${coin.price_change_percentage_24h.toFixed(2)}%
                </td>
            </tr>
        `).join('');
    }

    function selectCoin(symbol, name, price) {
        loadChart(symbol);
        document.getElementById('active-coin').innerText = name;
        document.getElementById('active-price').innerText = "$" + price;
        
        // Doctor Dark AI Analysis Logic (Simulation)
        const signalBox = document.getElementById('ai-signal');
        const rsi = (Math.random() * (70 - 30) + 30).toFixed(1);
        document.getElementById('rsi-val').innerText = rsi;

        if(rsi > 60) {
            signalBox.innerText = "Strong Sell";
            signalBox.className = "signal-badge sell";
            document.getElementById('trend-val').innerText = "Bearish";
            document.getElementById('trend-val').style.color = "var(--down)";
        } else {
            signalBox.innerText = "Strong Buy";
            signalBox.className = "signal-badge buy";
            document.getElementById('trend-val').innerText = "Bullish";
            document.getElementById('trend-val').style.color = "var(--up)";
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function updateTable(type, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(type === 'trending') renderTable([...allCoins].sort(() => Math.random() - 0.5).slice(0,15));
        else if(type === 'new') renderTable([...allCoins].reverse().slice(0,15));
        else renderTable(allCoins);
    }

    // Initial Load
    fetchData();
    loadChart("BTCUSDT");
    setInterval(fetchData, 30000);
</script>

</body>
</html>
