<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dark | Institutional Crypto Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0e11;
            --bg-panel: #1e2329;
            --primary: #f0b90b;
            --text-main: #eff2f5;
            --text-sub: #848e9c;
            --border: rgba(71, 77, 87, 0.4);
            --up: #0ecb81;
            --down: #f6465d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. Global Stats Bar (CMC Style) */
        .global-banner {
            background-color: #181a20;
            border-bottom: 1px solid var(--border);
            padding: 8px 5%;
            font-size: 11px;
            color: var(--text-sub);
            display: flex;
            gap: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .global-banner b { color: var(--text-main); }
        .global-banner .primary-stat { color: var(--primary); }

        /* 2. Professional Header */
        .app-header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
        }
        .app-logo { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: #fff; text-shadow: 0 0 10px rgba(240, 185, 11, 0.3); }
        .app-logo span { color: var(--primary); }

        /* 3. Fear & Greed Index Gauge */
        .fgi-gauge-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .fgi-dots { display: flex; gap: 4px; }
        .fgi-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.2; }
        .fgi-dot.active { opacity: 1; }

        /* Main Container */
        .main-view {
            padding: 20px 5% 70px; /* Padding for bottom nav */
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1000px) { .main-view { grid-template-columns: 1fr; } }

        /* Market Card & Coin Table */
        .market-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* 4. Navigation Tabs (CMC Style) */
        .tab-bar {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 0;
            color: var(--text-sub);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }
        .tab:hover { color: #fff; }
        .tab.active { color: var(--primary); }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary);
        }

        /* 5. Professional Table */
        .coin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .coin-table th { text-align: left; color: var(--text-sub); font-size: 11px; font-weight: 600; padding: 10px 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .coin-table td { padding: 15px 5px; border-bottom: 1px solid rgba(71, 77, 87, 0.2); cursor: pointer; font-weight: 600; }
        .coin-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* Coin Identity */
        .coin-cell { display: flex; align-items: center; gap: 10px; }
        .coin-logo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .coin-symbol { color: var(--text-main); font-weight: 700; }
        .coin-name { color: var(--text-sub); font-size: 12px; font-weight: 400; }

        .price-up { color: var(--up); }
        .price-down { color: var(--down); }

        /* 6. Chart & Tools */
        .chart-section { height: 500px; position: relative; overflow: hidden; border-radius: 12px; }

        /* 7. Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #181a20;
            border-top: 1px solid var(--border);
            padding: 10px 0;
            display: flex;
            justify-content: space-around;
            z-index: 999;
        }
        .nav-item { text-align: center; color: var(--text-sub); text-transform: uppercase; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item:hover { color: #fff; }
        .nav-item.active { color: var(--primary); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #474d57; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

    </style>
</head>
<body>

<div class="global-banner">
    <span>Cryptos: <b>2.4M+</b></span>
    <span>Exchanges: <b>740</b></span>
    <span>Global Cap: <b id="global-cap" class="primary-stat">$2.34T</b></span>
    <span>24h Vol: <b id="global-vol">$84.2B</b></span>
    <span>Dominance: <b>BTC 52.4% | ETH 16.8%</b></span>
</div>

<header class="app-header">
    <div class="app-logo">DOCTOR <span>DARK</span></div>
    
    <div class="fgi-gauge-container">
        <span style="font-size: 12px; color: #888;">SENTIMENT</span>
        <div class="fgi-dots">
            <div class="fgi-dot active" style="background:#f6465d;"></div>
            <div class="fgi-dot" style="background:#ff9900;"></div>
            <div class="fgi-dot" style="background:#0ecb81;"></div>
        </div>
        <span id="fgi-value" style="font-size: 14px; font-weight: bold; color: var(--up);">--</span>
    </div>
</header>

<div class="main-view">
    <div class="market-card">
        <h3 id="chart-pair" style="margin-top:0; font-family: 'Orbitron'; font-size: 1.1rem; color: white;">BTCUSDT Institutional Feed</h3>
        <div class="chart-section" id="tradingview_widget"></div>
    </div>

    <div class="market-card">
        <div class="tab-bar">
            <div class="tab active" onclick="switchList('top', this)">Top 100</div>
            <div class="tab" onclick="switchList('trending', this)">Trending</div>
            <div class="tab" onclick="switchList('watch', this)">Watchlist</div>
        </div>

        <div style="max-height: 500px; overflow-y: auto;">
            <table class="coin-table">
                <thead>
                    <tr><th>#</th><th>Coin</th><th>Price</th><th>24h%</th></tr>
                </thead>
                <tbody id="market-list-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active">Markets</div>
    <div class="nav-item">Analytics</div>
    <div class="nav-item">Dr. AI</div>
    <div class="nav-item">Portfolio</div>
    <div class="nav-item">Intel Hub</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let rawMarketData = [];
    const watchList = ['btc', 'eth', 'sol', 'bnb', 'trx'];

    async function initTerminal() {
        await loadMarketData();
        loadChart('BTCUSDT');
        updateGlobalStats();
    }

    async function loadMarketData() {
        try {
            // Price Fetch
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100');
            rawMarketData = await res.json();
            renderCoinTable(rawMarketData);
        } catch(e) { console.error("Network Error: Price Feed"); }
    }

    // 5. Advanced Table Rendering with logos
    function renderCoinTable(data, isTrending = false) {
        const body = document.getElementById('market-list-body');
        body.innerHTML = data.map((coin, i) => `
            <tr onclick="loadChart('${coin.symbol.toUpperCase()}USDT')">
                <td style="color:#555; width: 30px;">${i+1}</td>
                <td>
                    <div class="coin-cell">
                        <img class="coin-logo" src="${coin.image}" alt="${coin.name} logo">
                        <div>
                            <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                            <div class="coin-name">${coin.name}</div>
                        </div>
                    </div>
                </td>
                <td>${isTrending ? 'Hot' : '$'+coin.current_price.toLocaleString()}</td>
                <td class="${coin.price_change_percentage_24h >= 0 ? 'price-up' : 'price-down'}">
                    ${coin.price_change_percentage_24h.toFixed(2)}%
                </td>
            </tr>
        `).join('');
    }

    function switchList(type, el) {
        // Tab UI update
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        // Logic update
        const body = document.getElementById('market-list-body');
        body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">Loading Feed...</td></tr>';

        if(type === 'watch') {
            renderCoinTable(rawMarketData.filter(c => watchList.includes(c.symbol.toLowerCase())));
        } else if(type === 'trending') {
            // Simulate Trending
            fetchTrendingData();
        } else {
            loadMarketData();
        }
    }

    function loadChart(symbol) {
        document.getElementById('chart-pair').innerText = symbol + " Institutional Feed";
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + symbol,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_widget",
            "studies": ["RSI@tv-basicstudies"]
        });
    }

    async function updateGlobalStats() {
        try {
            // Sentiment
            const fgiRes = await fetch('https://api.alternative.me/fng/');
            const fgiData = await fgiRes.json();
            const fgiValue = fgiData.data[0].value;
            document.getElementById('fgi-value').innerText = fgiValue + " ("+ fgiData.data[0].value_classification +")";
            
            // Stats (Simulation for look)
            document.getElementById('global-cap').innerText = "$2.34T";
            document.getElementById('global-vol').innerText = "$84.2B";
        } catch(e) {}
    }

    // Initialize all systems
    initTerminal();
    setInterval(loadMarketData, 60000); // Auto-refresh every 60s
</script>

</body>
</html>
