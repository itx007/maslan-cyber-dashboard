<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Dark Analytics</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; background: #181a20; padding: 10px; font-size: 12px; border-radius: 5px; margin-bottom: 10px; }
        .card { background: #1e2329; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #474d57; }
        .tab-bar { display: flex; gap: 15px; border-bottom: 1px solid #474d57; margin-bottom: 10px; }
        .tab { cursor: pointer; padding-bottom: 5px; color: #848e9c; }
        .active { color: #f0b90b; border-bottom: 2px solid #f0b90b; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #2b3139; font-size: 14px; }
        .up { color: #0ecb81; } .down { color: #f6465d; }
    </style>
</head>
<body>

<div class="stats">
    <div>Cap: <span style="color:#f0b90b">$2.4T</span></div>
    <div>F&G Index: <span id="fgi" style="color:#f0b90b">Loading..</span></div>
</div>

<div class="card">
    <h3 id="c-name">BTCUSDT Chart</h3>
    <div id="chart-box" style="height:400px;"></div>
</div>

<div class="card">
    <div class="tab-bar">
        <div class="tab active" onclick="loadData('top', this)">Top 100</div>
        <div class="tab" onclick="loadData('trending', this)">Trending</div>
        <div class="tab" onclick="loadData('fav', this)">Watchlist</div>
    </div>
    <div style="max-height: 400px; overflow-y: auto;">
        <table>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let raw = [];

    async function start() {
        showChart('BTCUSDT');
        loadData('top');
        const f = await fetch('https://api.alternative.me/fng/');
        const fd = await f.json();
        document.getElementById('fgi').innerText = fd.data[0].value;
    }

    async function loadData(type, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        
        const list = document.getElementById('list');
        list.innerHTML = 'Loading...';

        try {
            let url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100';
            if(type === 'trending') url = 'https://api.coingecko.com/api/v3/search/trending';
            
            const res = await fetch(url);
            const data = await res.json();
            
            let final = type === 'trending' ? data.coins.map(c => ({symbol: c.item.symbol, current_price: 'Hot', price_change_percentage_24h: 0})) : data;
            if(type === 'fav') final = data.filter(c => ['btc','eth','sol','bnb','trx'].includes(c.symbol.toLowerCase()));

            list.innerHTML = final.map(c => `
                <tr onclick="showChart('${c.symbol.toUpperCase()}USDT')">
                    <td><strong>${c.symbol.toUpperCase()}</strong></td>
                    <td>${typeof c.current_price === 'number' ? '$'+c.current_price.toLocaleString() : c.current_price}</td>
                    <td class="${c.price_change_percentage_24h >= 0 ? 'up' : 'down'}">${c.price_change_percentage_24h.toFixed(2)}%</td>
                </tr>
            `).join('');
        } catch(e) { list.innerHTML = 'Error Loading Data'; }
    }

    function showChart(s) {
        document.getElementById('c-name').innerText = s + " Analysis";
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "theme": "dark", "container_id": "chart-box"
        });
    }

    start();
</script>
</body>
</html>
